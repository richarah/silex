name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull the previous silex:slim to use as the build base.
      # If no published image exists yet, fall back to bootstrap.
      - name: Pull or bootstrap silex:slim
        run: |
          if docker pull ghcr.io/${{ github.repository }}:slim 2>/dev/null; then
            docker tag ghcr.io/${{ github.repository }}:slim silex:slim
            echo "SILEX_BUILD_MODE=self-hosted" >> $GITHUB_ENV
          else
            echo "No published image found; running bootstrap build."
            echo "SILEX_BUILD_MODE=bootstrap" >> $GITHUB_ENV
          fi

      - name: Build silex:slim (self-hosted)
        if: env.SILEX_BUILD_MODE == 'self-hosted'
        run: make build

      - name: Build silex:slim (bootstrap)
        if: env.SILEX_BUILD_MODE == 'bootstrap'
        run: make bootstrap

      - name: Check image size
        run: |
          SIZE_MB=$(docker inspect silex:slim --format='{{.Size}}' | awk '{printf "%.0f\n", $1/1024/1024}')
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 1500 ]; then
            echo "ERROR: Image size ${SIZE_MB}MB exceeds 1500MB ceiling"
            exit 1
          fi

      - name: Run compat tests
        run: make test

      - name: Lint examples
        run: |
          for df in examples/*/Dockerfile; do
            echo "=== $df ==="
            docker run --rm -v "$PWD:/workspace" -w /workspace silex:slim \
              silex lint "$df" || true
          done
