name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build silex:slim
        run: bash scripts/build.sh --only slim

      - name: Check image size
        run: |
          SIZE_MB=$(docker inspect silex:slim --format='{{.Size}}' | awk '{printf "%.0f\n", $1/1024/1024}')
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 700 ]; then
            echo "ERROR: Image size ${SIZE_MB}MB exceeds 700MB ceiling"
            exit 1
          fi

      - name: Run test suite
        run: bash scripts/test.sh

      - name: Lint examples
        run: |
          for df in examples/*/Dockerfile; do
            echo "=== $df ==="
            docker run --rm -v "$PWD:/workspace" -w /workspace silex:slim \
              silex lint "$df" || true
          done
