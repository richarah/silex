name: Core CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'core/**'
      - '.github/workflows/core-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'core/**'
      - '.github/workflows/core-ci.yml'

# Every run: step in this workflow assumes the repo root is core/.
# NOTE: this does NOT apply to `uses:` steps -- actions/cache, upload-artifact
# and friends resolve their path: inputs against the workspace root, so those
# are spelled out with the core/ prefix by hand below.
defaults:
  run:
    working-directory: core

jobs:
  # Job 1: Build and test with GCC
  build-test-gcc:
    name: Build & test (gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Build
        run: make CC=gcc
      - name: Unit tests
        run: make test
      - name: Integration tests
        run: bash tests/integration/run_integration.sh build/bin/silex

  # Job 2: AddressSanitizer + UndefinedBehaviorSanitizer
  asan:
    name: ASan/UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Build (debug + sanitizers)
        run: make debug
      - name: Unit tests under ASan
        run: make test

  # Job 3: Compatibility tests
  compat:
    name: Compat tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make dash
      - name: Build
        run: make
      - name: Compat tests
        run: make compat-test

  # Job 4: Static analysis
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tools cppcheck make
      - name: Build (needed for headers)
        run: make
      # --status-bugs and --error-exitcode exist to make these fail. Both used to
      # end in `|| true`, which threw that away -- this job could not fail.
      - name: scan-build
        # LTO_FLAG= : the Makefile picks -flto=thin when CC is clang, but
        # scan-build's ccc-analyzer wrapper drives gcc underneath, and gcc does
        # not know clang's thin LTO ("unrecognized argument to -flto=: thin").
        # LTO is irrelevant to static analysis anyway.
        run: |
          make clean
          scan-build --status-bugs make CC=clang LTO_FLAG=
      - name: cppcheck
        run: make cppcheck

  # Job 5: Shellcheck on test scripts
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on our test scripts
        # Three things were wrong with this step:
        #
        #   1. `find tests/` walks tests/external/repos/ -- 3,478 THIRD-PARTY
        #      shell scripts (smoosh, modernish, the GNU coreutils suite). We
        #      were linting other people's code and failing on it.
        #   2. `-s sh` forced POSIX mode onto scripts with a #!/bin/bash shebang,
        #      producing 267 "local is undefined" errors for code that is
        #      correct bash. Let shellcheck read the shebang.
        #   3. It gated on style warnings, so it could never be green and
        #      therefore told you nothing.
        #
        # Now: our scripts only, shebang respected, and it fails on real errors.
        run: |
          find tests/ -name '*.sh' -not -path '*/external/repos/*' -print0 \
            | xargs -0 shellcheck --severity=error

  # Job 6: Binary size check (musl/alpine) -- uses canonical release target
  binary-size:
    name: Binary size (musl/alpine)
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: apk add --no-cache gcc musl-dev make binutils linux-headers
      - name: Build (musl static release)
        run: make release
      - name: Check binary size <= 1.5MB
        run: |
          SIZE=$(wc -c < build/bin/silex)
          echo "Stripped size: ${SIZE} bytes ($(( SIZE / 1024 ))K)"
          if [ "$SIZE" -gt 1572864 ]; then
            echo "FAIL: binary ${SIZE} bytes > 1.5MB limit"
            exit 1
          fi
          echo "OK: binary within 1.5MB limit"

  # Job 7: Cross-compile for aarch64 (QEMU)
  aarch64:
    name: aarch64 cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu make qemu-user-static
      - name: Cross-compile
        run: |
          make CC=aarch64-linux-gnu-gcc \
               LDFLAGS="-static" \
               LDLIBS="-ldl"
      - name: Run under QEMU
        run: qemu-aarch64-static build/bin/silex --version

  # Job 8: Build and test on musl (Alpine)
  test-musl:
    name: Build and test (musl/Alpine)
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        # coreutils: the compat suite compares silex against the SYSTEM tool, and
        # on Alpine that is busybox, which pads `wc` output differently from GNU.
        # silex matches GNU (correctly), so it "failed" against the wrong
        # reference. The suite exists to check GNU compatibility -- so install GNU.
        run: apk add --no-cache gcc musl-dev make linux-headers bash coreutils
      - name: Build release
        run: make release
      - name: Unit tests
        run: make test
      - name: Compat tests
        run: make compat-test

  # Job 9: Build and test on glibc (Ubuntu)
  test-glibc:
    name: Build and test (glibc/Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Build release-glibc
        run: make release-glibc
      - name: Unit tests
        run: make test
      - name: Compat tests
        run: make compat-test

  # Job 10: ASan/UBSan on musl (Alpine)
  test-musl-asan:
    name: ASan/UBSan (musl/Alpine)
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        # coreutils: the compat suite compares silex against the SYSTEM tool, and
        # on Alpine that is busybox, which pads `wc` output differently from GNU.
        # silex matches GNU (correctly), so it "failed" against the wrong
        # reference. The suite exists to check GNU compatibility -- so install GNU.
        run: apk add --no-cache gcc musl-dev make linux-headers bash coreutils
      - name: Build debug
        run: make debug
      - name: Unit tests under ASan
        run: make test

  # Job 11: ASan/UBSan on glibc (Ubuntu)
  test-glibc-asan:
    name: ASan/UBSan (glibc/Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make
      - name: Build debug
        run: make debug
      - name: Unit tests under ASan
        run: make test

  # Job 12: External test suites (comprehensive conformance validation)
  external-tests:
    name: External test suites
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Parallel execution in Docker (~45 min)
    steps:
      - uses: actions/checkout@v4

      - name: Cache external test repositories
        uses: actions/cache@v4
        with:
          path: core/tests/external/repos
          key: external-repos-${{ hashFiles('core/tests/external/fetch-all.sh') }}

      - name: Run external tests (Docker)
        run: make external-test-docker

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: external-test-results
          path: core/tests/external/results/

      # A missing results file means the suite did not run. That is a failure,
      # not a pass. This step used to print "? results not found" and fall
      # through to "✓ All critical checks passed", so a suite that crashed
      # before producing output was indistinguishable from a suite that passed.
      - name: Check critical requirements
        run: |
          set -eu
          echo "Checking critical requirements..."

          require_results() {
            _pattern="$1"
            _name="$2"
            _latest=$(ls -t $_pattern 2>/dev/null | head -1 || true)
            if [ -z "$_latest" ] || [ ! -f "$_latest" ]; then
              echo "✗ BLOCKER: no $_name results found ($_pattern)."
              echo "  The suite did not run. That is a failure, not a pass."
              exit 1
            fi
            printf '%s' "$_latest"
          }

          # Check 1: modernish fatal-bug count must be 0
          latest=$(require_results 'tests/external/results/modernish-*.txt' modernish)
          ftl=$(grep -i 'Fatal bugs (FTL):' "$latest" | grep -oE '[0-9]+' | head -1 || true)
          if [ -z "$ftl" ]; then
            echo "✗ BLOCKER: could not read an FTL count from $latest."
            echo "  modernish almost certainly failed to launch. A missing count is"
            echo "  not a zero count."
            exit 1
          fi
          if [ "$ftl" -ne 0 ]; then
            echo "✗ BLOCKER: modernish FTL count = $ftl (must be 0)"
            exit 1
          fi
          echo "✓ modernish FTL count = 0"

          # Check 2: every Autoconf configure script must pass
          latest=$(require_results 'tests/external/results/configure-*.txt' configure)
          conf_fail=$(grep -i 'Failed:' "$latest" | grep -oE '[0-9]+' | head -1 || true)
          if [ -z "$conf_fail" ]; then
            echo "✗ BLOCKER: could not read a failure count from $latest."
            exit 1
          fi
          if [ "$conf_fail" -ne 0 ]; then
            echo "✗ BLOCKER: configure failures = $conf_fail (must be 0)"
            exit 1
          fi
          echo "✓ All configure scripts passed"

          echo ""
          echo "✓ All critical checks passed"
