name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build and Push Multi-Arch Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push silex:slim (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim-${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim-latest

      - name: Build and push silex:dev (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.dev
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ steps.version.outputs.VERSION }}

      - name: Build and push silex:runtime (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:runtime
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:runtime-${{ steps.version.outputs.VERSION }}

      - name: Get image size
        id: image_size
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          SIZE_MB=$(docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim --format='{{.Size}}' | awk '{printf "%.0f\n", $1/1024/1024}')
          echo "SIZE_MB=${SIZE_MB}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Silex ${{ github.ref_name }}

            ### Images

            ```
            docker pull ghcr.io/richarah/silex:slim
            docker pull ghcr.io/richarah/silex:dev
            docker pull ghcr.io/richarah/silex:runtime
            ```

            ### Image Sizes

            | Image | Size |
            |-------|------|
            | `silex:slim` | ~${{ steps.image_size.outputs.SIZE_MB }}MB |
            | `silex:runtime` | <30MB |

            ### Quick Start

            ```dockerfile
            FROM ghcr.io/richarah/silex:slim

            COPY . /workspace
            WORKDIR /workspace

            RUN cmake -B build && cmake --build build
            ```
