name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Bootstrap build from source. Reproducible, no dependency on previous image.
      # arm64 via QEMU is too slow for a full LLVM build; native arm64 runner required.
      - name: Build silex:slim (bootstrap, amd64)
        run: make bootstrap TARGETARCH=amd64

      - name: Tag and push silex:slim
        run: |
          IMG="${{ env.REGISTRY }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          docker tag silex:slim "${IMG}:slim"
          docker tag silex:slim "${IMG}:slim-${{ steps.version.outputs.VERSION }}"
          docker tag silex:slim "${IMG}:slim-latest"
          docker push "${IMG}:slim"
          docker push "${IMG}:slim-${{ steps.version.outputs.VERSION }}"
          docker push "${IMG}:slim-latest"

      - name: Get image size
        id: image_size
        run: |
          SIZE_MB=$(docker inspect silex:slim --format='{{.Size}}' | awk '{printf "%.0f\n", $1/1024/1024}')
          echo "SIZE_MB=${SIZE_MB}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Silex ${{ github.ref_name }}

            ### Images

            ```
            docker pull ghcr.io/richarah/silex:slim
            ```

            ### Image Sizes

            | Image | Size |
            |-------|------|
            | `silex:slim` | ~${{ steps.image_size.outputs.SIZE_MB }}MB |
            | `silex:runtime` | <30MB |

            ### Quick Start

            ```dockerfile
            FROM ghcr.io/richarah/silex:slim

            COPY . /workspace
            WORKDIR /workspace

            RUN cmake -B build && cmake --build build
            ```
